<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미녀삼총사 책모임</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap');
:root{
  --purple:#7F77DD;--pl:#EEEDFE;--pm:#AFA9EC;--pd:#3C3489;
  --teal:#1D9E75;--tl:#E1F5EE;--td:#085041;
  --coral:#D85A30;--cl:#FAECE7;--cd:#712B13;
  --g50:#F7F6F3;--g100:#EEECEA;--g700:#4A4946;
  --text:#1E1D1B;--ts:#6B6A66;--th:#A09F9A;
  --b:rgba(0,0,0,0.09);--bm:rgba(0,0,0,0.14);
  --bg:#F4F3F0;--card:#FFFFFF;--r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:24px;}
.ov{display:none;position:fixed;inset:0;background:rgba(244,243,240,0.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.ov.show{display:flex;}
.sp{width:28px;height:28px;border:2.5px solid var(--pl);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-size:13px;color:var(--ts);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g700);color:#fff;font-size:13px;padding:10px 18px;border-radius:99px;z-index:300;transition:transform .25s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.hdr{background:var(--card);border-bottom:.5px solid var(--bm);padding:14px 16px 12px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.atitle{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:600;}
.ms{display:flex;gap:5px;}
.mb{padding:5px 11px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:.5px solid var(--bm);border-radius:99px;background:transparent;color:var(--ts);cursor:pointer;transition:all .15s;}
.mb.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.tabs{display:flex;gap:2px;background:var(--g100);border-radius:10px;padding:3px;}
.tb{flex:1;padding:7px 2px;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:500;border:none;border-radius:8px;background:transparent;color:var(--ts);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tb.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.07);}
.main{padding:14px 14px 0;max-width:580px;margin:0 auto;}
.sec{display:none;}.sec.on{display:block;}
.card{background:var(--card);border:.5px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.ct{font-size:11px;font-weight:500;color:var(--th);letter-spacing:.07em;margin-bottom:12px;text-transform:uppercase;}
textarea,input[type=text],input[type=date],input[type=number]{width:100%;font-size:14px;font-family:'Noto Sans KR',sans-serif;border:.5px solid var(--bm);border-radius:var(--rs);padding:9px 11px;color:var(--text);background:var(--g50);outline:none;transition:border-color .15s;}
textarea:focus,input:focus{border-color:var(--purple);background:#fff;}
textarea{resize:none;line-height:1.65;}
.fl{font-size:12px;color:var(--ts);margin-bottom:5px;display:block;}
.opt{font-size:11px;color:var(--th);margin-left:3px;}
.mb10{margin-bottom:10px;}
.div{border:none;border-top:.5px solid var(--b);margin:13px 0;}
/* 책 칩 */
.bchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.bchip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--bm);background:var(--g50);color:var(--ts);transition:all .12s;}
.bchip:hover,.bchip.on{background:var(--pl);color:var(--pd);border-color:var(--pm);}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0;}
.badd{display:flex;gap:7px;}
.badd input{flex:1;}
/* 태그 */
.tir{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
.tir input{flex:1;}
.bsm{padding:0 13px;height:36px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:.5px solid var(--bm);border-radius:var(--rs);background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;transition:background .12s;}
.bsm:hover{background:var(--g100);}
.tw{display:flex;flex-wrap:wrap;gap:6px;min-height:20px;margin-bottom:8px;}
.tm{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;background:var(--pl);color:var(--pd);}
.trm{background:none;border:none;color:var(--pm);cursor:pointer;font-size:15px;line-height:1;padding:0;}
.sl{font-size:12px;color:var(--th);margin-bottom:6px;}
.sw{display:flex;flex-wrap:wrap;gap:6px;}
.stag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:12px;border:.5px dashed var(--bm);background:transparent;color:var(--ts);cursor:pointer;transition:all .12s;}
.stag:hover{background:var(--g100);color:var(--text);}
.swho{font-size:11px;color:var(--th);}
/* 버튼 */
.bsub{width:100%;padding:12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;border:none;border-radius:var(--rs);background:var(--purple);color:#fff;cursor:pointer;transition:opacity .15s;margin-top:6px;}
.bsub:hover{opacity:.88;}.bsub:disabled{opacity:.45;cursor:not-allowed;}
/* 피드 */
.fi{background:var(--card);border:.5px solid var(--b);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;}
.ftop{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.av0{background:var(--pl);color:var(--pd);}
.av1{background:var(--tl);color:var(--td);}
.av2{background:var(--cl);color:var(--cd);}
.fan{font-size:13px;font-weight:500;color:var(--text);}
.fbt{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--g100);color:var(--ts);margin-left:4px;}
.fpage{font-size:12px;color:var(--th);margin-left:4px;}
.ftext{font-size:14px;color:var(--text);line-height:1.65;}
.fq{font-size:13px;color:var(--ts);font-family:'Noto Serif KR',serif;border-left:2px solid var(--pm);padding-left:10px;margin-top:2px;line-height:1.6;font-style:italic;}
.ftags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.ftag{padding:3px 9px;border-radius:99px;font-size:12px;background:var(--pl);color:var(--pd);}
.bdel{background:none;border:none;color:var(--th);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;border-radius:4px;transition:color .12s;flex-shrink:0;margin-left:auto;}
.bdel:hover{color:#E24B4A;}
.empty{text-align:center;padding:40px 20px;font-size:14px;color:var(--th);line-height:1.7;}
/* 별점 */
.si{display:flex;gap:6px;}
.sb{width:32px;height:32px;border-radius:50%;border:.5px solid var(--bm);background:var(--g50);cursor:pointer;font-size:13px;color:var(--ts);transition:all .12s;display:flex;align-items:center;justify-content:center;}
.sb.on{background:#EF9F27;border-color:#EF9F27;color:#fff;font-weight:500;}
/* 다음모임 */
.nf{margin-bottom:14px;}
.nd{font-size:15px;font-weight:500;padding:10px 12px;background:var(--g50);border:.5px solid var(--b);border-radius:var(--rs);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.be{font-size:12px;color:var(--purple);background:none;border:none;cursor:pointer;padding:0;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
.er{display:flex;gap:7px;align-items:center;margin-top:6px;}
.er input{flex:1;}
.bsv{padding:0 14px;height:38px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--purple);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;white-space:nowrap;flex-shrink:0;}
/* 타임라인 */
.tlw{position:relative;padding-left:22px;}
.tlw::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--b);}
.tli{position:relative;margin-bottom:10px;}
.tld{position:absolute;left:-19px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);}
.dd{background:var(--purple);}
.dn{background:var(--teal);}
.tlc{background:var(--card);border:.5px solid var(--b);border-radius:var(--r);padding:11px 14px;}
.tlc.isnext{border-color:#5DCAA5;border-width:1.5px;background:#E1F5EE;}
.tlbadge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;margin-bottom:5px;}
.bdone{background:var(--pl);color:var(--pd);}
.bnext{background:var(--tl);color:var(--td);}
.tldate{font-size:12px;color:var(--ts);margin-bottom:2px;}
.tlbook{font-size:14px;font-weight:500;color:var(--text);}
.tlbook.isnext{color:var(--td);}
.tl-actions{display:flex;gap:6px;margin-top:8px;}
.tl-btn{padding:4px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:.5px solid var(--bm);border-radius:var(--rs);background:transparent;color:var(--ts);cursor:pointer;}
.tl-btn:hover{background:var(--g100);}
.tl-btn.del:hover{color:#E24B4A;border-color:#E24B4A;}
.tl-edit-row{margin-top:8px;display:flex;flex-direction:column;gap:7px;}
.tl-edit-row input{font-size:13px;}
.tl-edit-btns{display:flex;gap:6px;}
/* 페이저 */
.pgr{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;}
.pgb{padding:6px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:.5px solid var(--bm);border-radius:var(--rs);background:transparent;color:var(--ts);cursor:pointer;}
.pgb:disabled{opacity:.3;cursor:not-allowed;}
.pgi{font-size:13px;color:var(--ts);}
/* 책장 */
.shstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.shstrip::-webkit-scrollbar{display:none;}
.shcard{flex-shrink:0;width:84px;background:var(--card);border:.5px solid var(--b);border-radius:var(--rs);padding:8px;cursor:pointer;transition:border-color .12s;}
.shcard.on{border-color:var(--purple);border-width:1.5px;}
.shspine{width:100%;height:32px;border-radius:3px;margin-bottom:5px;}
.shtitle{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shnav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.shnb{padding:6px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:.5px solid var(--bm);border-radius:var(--rs);background:transparent;color:var(--ts);cursor:pointer;}
.shnb:hover{background:var(--g100);}
.shlabel{flex:1;text-align:center;font-size:15px;font-weight:500;color:var(--text);}
.bbanner{background:var(--card);border:.5px solid var(--b);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.rspine{width:44px;height:60px;border-radius:4px;flex-shrink:0;}
.rbtitle{font-size:16px;font-weight:600;color:var(--text);font-family:'Noto Serif KR',serif;}
.rbsub{font-size:12px;color:var(--th);margin-top:5px;}
.avgb{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:500;background:#FAEEDA;color:#633806;margin-top:5px;}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.sc{background:var(--g100);border-radius:var(--rs);padding:12px;}
.scl{font-size:12px;color:var(--ts);margin-bottom:3px;}
.scv{font-size:22px;font-weight:500;color:var(--text);}
.kwc{background:var(--card);border:.5px solid var(--b);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.kww{display:flex;flex-wrap:wrap;gap:7px;}
.kw{display:inline-flex;align-items:center;padding:5px 13px;border-radius:99px;font-weight:500;}
.kw3{background:var(--pl);color:var(--pd);font-size:16px;}
.kw2{background:var(--tl);color:var(--td);font-size:14px;}
.kw1{background:var(--g100);color:var(--g700);font-size:13px;}
.kwh{font-size:11px;color:var(--th);margin-top:8px;}
.rc{background:var(--card);border:.5px solid var(--b);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.rrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b);}
.rrow:last-child{border-bottom:none;}
.rname{font-size:13px;color:var(--text);flex:1;}
.stars{display:flex;gap:3px;}
.star{width:11px;height:11px;border-radius:50%;}
.son{background:#EF9F27;}.soff{background:var(--g100);}
/* 다음모임 예고 */
.np{background:var(--pl);border:.5px solid var(--pm);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.npt{font-size:11px;font-weight:500;color:var(--pd);letter-spacing:.07em;margin-bottom:10px;text-transform:uppercase;}
.npr{display:flex;gap:20px;}
.npl{font-size:12px;color:var(--pd);opacity:.7;margin-bottom:2px;}
.npv{font-size:14px;font-weight:500;color:var(--pd);}
@media(max-width:380px){.tb{font-size:10px;}}
</style>
</head>
<body>
<div class="ov" id="ov"><div class="sp"></div><div class="lt" id="lt">불러오는 중...</div></div>
<div class="toast" id="toast"></div>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="atitle">미녀삼총사 책모임</div>
      <div class="ms" id="ms"></div>
    </div>
    <div class="tabs">
      <button class="tb on" onclick="showTab('q')">인상적인 문장</button>
      <button class="tb" onclick="showTab('t')">생각 남기기</button>
      <button class="tb" onclick="showTab('n')">다음 모임</button>
      <button class="tb" onclick="showTab('s')">우리의 책장</button>
    </div>
  </div>
  <div class="main">

    <!-- 인상적인 문장 -->
    <div id="sec-q" class="sec on">
      <div class="card" style="margin-top:12px;">
        <div class="ct">지금 읽는 책</div>
        <div class="bchips" id="q-chips"></div>
        <div class="badd">
          <input type="text" id="q-bnew" placeholder="새 책 제목 추가...">
          <button class="bsm" onclick="addBook('q')">추가</button>
        </div>
      </div>
      <div class="card">
        <div class="ct">인상적인 문장 남기기</div>
        <label class="fl">페이지<span class="opt">(선택)</span></label>
        <input type="number" id="q-page" placeholder="예: 87" min="1" class="mb10">
        <label class="fl">문장<span class="opt">(선택)</span></label>
        <textarea id="q-quote" rows="2" placeholder="인상적인 문장을 그대로 입력해요..." class="mb10"></textarea>
        <label class="fl">한 줄 메모<span class="opt">(선택)</span></label>
        <textarea id="q-memo" rows="2" placeholder="이 문장이 인상적인 이유나 떠오른 생각..." class="mb10"></textarea>
        <div class="div"></div>
        <label class="fl">키워드<span class="opt">(선택)</span></label>
        <div class="tir"><input type="text" id="q-ki" placeholder="키워드 입력 후 Enter" onkeydown="kwKey(event,'q')"><button class="bsm" onclick="addTag('q')">+ 추가</button></div>
        <div class="tw" id="q-tw"></div>
        <div class="sl" id="q-sl"></div><div class="sw" id="q-sw"></div>
        <button class="bsub" id="q-sub" onclick="submitQ()">문장 기록하기</button>
      </div>
      <div id="q-feed"></div>
    </div>

    <!-- 생각 남기기 -->
    <div id="sec-t" class="sec">
      <div class="card" style="margin-top:12px;">
        <div class="ct">지금 읽는 책</div>
        <div class="bchips" id="t-chips"></div>
        <div class="badd">
          <input type="text" id="t-bnew" placeholder="새 책 제목 추가...">
          <button class="bsm" onclick="addBook('t')">추가</button>
        </div>
      </div>
      <div class="card">
        <div class="ct">생각 남기기</div>
        <label class="fl">생각<span class="opt">(선택)</span></label>
        <textarea id="t-text" rows="4" placeholder="읽으면서 떠오른 생각, 질문, 인사이트를 자유롭게..." class="mb10"></textarea>
        <div class="div"></div>
        <label class="fl">키워드<span class="opt">(선택)</span></label>
        <div class="tir"><input type="text" id="t-ki" placeholder="키워드 입력 후 Enter" onkeydown="kwKey(event,'t')"><button class="bsm" onclick="addTag('t')">+ 추가</button></div>
        <div class="tw" id="t-tw"></div>
        <div class="sl" id="t-sl"></div><div class="sw" id="t-sw"></div>
        <div class="div"></div>
        <label class="fl">이 책 별점<span class="opt">(선택)</span></label>
        <div class="si" id="t-si"></div>
        <button class="bsub" id="t-sub" onclick="submitT()" style="margin-top:14px;">생각 기록하기</button>
      </div>
      <div id="t-feed"></div>
    </div>

    <!-- 다음 모임 -->
    <div id="sec-n" class="sec">
      <div class="card" style="margin-top:12px;">
        <div class="ct">모임 기록 입력</div>
        <label class="fl">날짜</label>
        <input type="date" id="n-date" class="mb10">
        <label class="fl">책 제목</label>
        <input type="text" id="n-book" placeholder="책 제목을 입력해요" class="mb10">
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button class="bsm" id="tp-done" onclick="setMType('done')" style="flex:1;background:var(--pl);color:var(--pd);border-color:var(--pm);">완료된 모임</button>
          <button class="bsm" id="tp-next" onclick="setMType('next')" style="flex:1;">다음 모임 예고</button>
        </div>
        <button class="bsub" onclick="saveHist()">저장하기</button>
      </div>
      <div class="card" style="margin-top:4px;">
        <div class="ct">다음 모임</div>
        <div style="display:flex;gap:16px;">
          <div><div class="fl">날짜</div><div style="font-size:15px;font-weight:500;margin-top:3px;" id="n-dval">미정</div></div>
          <div><div class="fl">책</div><div style="font-size:15px;font-weight:500;margin-top:3px;" id="n-bval">미정</div></div>
        </div>
      </div>
      <div class="ct" style="margin:8px 0 8px;">모임 흐름</div>
      <div id="n-hist"></div>
      <div class="pgr" id="n-pgr" style="display:none;">
        <button class="pgb" id="pgprev" onclick="hPage(-1)">← 이전</button>
        <span class="pgi" id="pgi"></span>
        <button class="pgb" id="pgnext" onclick="hPage(1)">다음 →</button>
      </div>
    </div>

    <!-- 우리의 책장 -->
    <div id="sec-s" class="sec">
      <div style="margin-top:12px;">
        <div class="shstrip" id="sh-strip"></div>
        <div class="shnav">
          <button class="shnb" onclick="prevSh()">←</button>
          <span class="shlabel" id="sh-label"></span>
          <button class="shnb" onclick="nextSh()">→</button>
        </div>
        <div id="sh-body"></div>
      </div>
    </div>

  </div>
</div>
<script>
const MEMBERS=['계희','미선','나형'];
const AVC=['av0','av1','av2'];
const COLORS=['#7F77DD','#1D9E75','#D85A30','#378ADD','#BA7517','#D4537E','#534AB7','#0F6E56'];
// ★ 새 Apps Script URL로 교체해주세요
const URL='https://script.google.com/macros/s/AKfycbzVzpbkwLHqNCV9-Eu-ci1fGcgTPO9II2598GlsL7DY4hezZXFOK3sv5mGjG0gRX8pPTA/exec
';

let cm=parseInt(localStorage.getItem('bcM')||'0');
let tags={q:[],t:[]};
let stars=0;
let shIdx=0;
let books=[];
let selBook={q:'',t:''};
let mtype='done';
let histAll=[];
let hpage=0;
const HPP=4;
let cache={q:[],t:[]};
let editingHistId=null;
let nextInfo={};

// JSONP
function jp(params){
  return new Promise((res,rej)=>{
    const cb='_cb'+Date.now()+'_'+Math.random().toString(36).slice(2);
    params.callback=cb;
    const u=URL+'?'+new URLSearchParams(params);
    const s=document.createElement('script');s.type='text/javascript';
    const t=setTimeout(()=>{cl();rej(new Error('시간 초과'));},15000);
    function cl(){clearTimeout(t);if(window[cb])delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=(d)=>{cl();if(d&&d.error)rej(new Error(d.error));else res(d||{});};
    s.addEventListener('error',()=>{cl();rej(new Error('네트워크 오류'));});
    document.head.appendChild(s);s.src=u;
  });
}
const api=(p)=>jp(p);
const post=(b)=>jp({payload:JSON.stringify(b)});

function showL(t='저장 중...'){document.getElementById('ov').classList.add('show');document.getElementById('lt').textContent=t;}
function hideL(){document.getElementById('ov').classList.remove('show');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmtD(d){
  if(!d||d==='미정'||!String(d).trim())return'미정';
  const s=String(d).trim();
  const m=s.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  if(m)return `${m[1]}년 ${parseInt(m[2])}월 ${parseInt(m[3])}일`;
  return s;
}

// 책 목록
async function loadBooks(){
  try{const r=await api({action:'getBooks'});books=r.books||[];renderChips('q');renderChips('t');}
  catch(e){console.error('loadBooks',e);}
}
function renderChips(p){
  const w=document.getElementById(`${p}-chips`);if(!w)return;
  if(!books.length){w.innerHTML='<div style="font-size:13px;color:var(--th);padding:4px 0;">아래에서 책을 추가해주세요.</div>';return;}
  w.innerHTML=books.map(b=>`<div class="bchip ${selBook[p]===b?'on':''}" onclick="selB('${p}','${b.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
    ${selBook[p]===b?'<div class="cdot"></div>':''}${b}</div>`).join('');
}
function selB(p,b){
  selBook[p]=selBook[p]===b?'':b;
  renderChips(p);
  if(selBook[p])loadBookData(p);
  else renderFeed(p);
}
async function loadBookData(p){
  if(!selBook[p])return;
  try{
    const r=await api({action:'getAll',book:encodeURIComponent(selBook[p])});
    const qs=(r.quotes||[]).map(q=>{if(!Array.isArray(q.keywords))q.keywords=q.keywords?String(q.keywords).split(',').filter(Boolean):[];return q;});
    const ts=(r.thoughts||[]).map(t=>{if(!Array.isArray(t.keywords))t.keywords=t.keywords?String(t.keywords).split(',').filter(Boolean):[];t.stars=Number(t.stars)||0;return t;});
    if(p==='q')cache.q=qs;
    else cache.t=ts;
    renderFeed(p);renderSugs();
  }catch(e){console.error('loadBookData',e);}
}
async function addBook(p){
  const inp=document.getElementById(`${p}-bnew`);
  const v=inp.value.trim();
  if(!v){toast('책 제목을 입력해주세요.');return;}
  if(books.includes(v)){toast('이미 있는 책이에요!');selB(p,v);inp.value='';return;}
  showL('책 추가 중...');
  try{
    await post({action:'addBook',title:v});
    books.push(v);
    selBook[p]=v;
    renderChips('q');renderChips('t');
    inp.value='';
    toast(`"${v}" 추가됐어요!`);
  }catch(e){toast('추가 실패: '+e.message);}
  hideL();
}

// 태그
function kwKey(e,p){if(e.key==='Enter'){e.preventDefault();addTag(p);}}
function addTag(p){const el=document.getElementById(`${p}-ki`);const v=el.value.trim();if(v&&!tags[p].includes(v)){tags[p].push(v);el.value='';renderTags(p);}}
function rmTag(p,w){tags[p]=tags[p].filter(x=>x!==w);renderTags(p);}
function renderTags(p){
  document.getElementById(`${p}-tw`).innerHTML=tags[p].map(w=>`<span class="tm">${w}<button class="trm" onclick="rmTag('${p}','${w}')">×</button></span>`).join('');
  renderSugFor(p);
}
function allKws(){
  const all=[...cache.q,...cache.t];
  const cnt={};
  all.forEach(item=>(item.keywords||[]).forEach(kw=>{if(!cnt[kw])cnt[kw]={total:0,who:new Set()};cnt[kw].total++;cnt[kw].who.add(String(item.member));}));
  return cnt;
}
function renderSugFor(p){
  const kws=allKws();
  const sugs=Object.entries(kws).filter(([w])=>!tags[p].includes(w)).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
  const sl=document.getElementById(`${p}-sl`);const sw=document.getElementById(`${p}-sw`);
  if(!sugs.length){sl.textContent='';sw.innerHTML='';return;}
  sl.textContent='다른 멤버들이 쓴 키워드';
  sw.innerHTML=sugs.map(([w,info])=>{const who=[...info.who].map(i=>MEMBERS[parseInt(i)]).filter(Boolean).join(', ');return `<button class="stag" onclick="pickSug('${p}','${w}')">${w} <span class="swho">${who}</span></button>`;}).join('');
}
function renderSugs(){renderSugFor('q');renderSugFor('t');}
function pickSug(p,w){if(!tags[p].includes(w)){tags[p].push(w);renderTags(p);}}

// 별점
function renderSi(){document.getElementById('t-si').innerHTML=Array.from({length:5},(_,i)=>`<button class="sb ${i<stars?'on':''}" onclick="setStar(${i+1})">${i+1}</button>`).join('');}
function setStar(n){stars=n;renderSi();}

// 피드
function renderFeed(p){
  const items=p==='q'?cache.q:cache.t;
  const el=document.getElementById(`${p}-feed`);
  if(!el)return;
  if(!items.length){
    el.innerHTML=`<div class="empty">${selBook[p]?`"${selBook[p]}"에 대한 기록이 없어요.<br>첫 번째로 남겨보세요!`:'책을 선택하거나 추가해주세요.'}</div>`;
    return;
  }
  el.innerHTML=[...items].reverse().map(item=>{
    const mi=parseInt(item.member);
    const smi=(isNaN(mi)||mi<0||mi>=3)?0:mi;
    const name=MEMBERS[smi];const avc=AVC[smi];
    const kwArr=Array.isArray(item.keywords)?item.keywords:(item.keywords?String(item.keywords).split(',').filter(Boolean):[]);
    const tgs=kwArr.map(k=>`<span class="ftag">${k}</span>`).join('');
    const isMine=smi===cm;
    const del=isMine?`<button class="bdel" onclick="delItem('${p==='q'?'quotes':'thoughts'}','${item.id}')" title="삭제">×</button>`:'';
    const bt=item.book?`<span class="fbt">${item.book}</span>`:'';
    if(p==='q'){
      return `<div class="fi"><div class="ftop"><div class="av ${avc}">${name[0]}</div><span class="fan">${name}</span>${bt}${item.page?`<span class="fpage">p.${item.page}</span>`:''}<span style="margin-left:auto;">${del}</span></div>
        ${item.quote?`<div class="fq">"${item.quote}"</div>`:''}${item.memo?`<div class="ftext" style="margin-top:6px;">${item.memo}</div>`:''}
        ${tgs?`<div class="ftags">${tgs}</div>`:''}</div>`;
    }
    const sh=Number(item.stars)>0?`<div style="display:flex;gap:3px;margin-top:6px;">${Array.from({length:5},(_,si)=>`<div class="star ${si<Number(item.stars)?'son':'soff'}"></div>`).join('')}</div>`:'';
    return `<div class="fi"><div class="ftop"><div class="av ${avc}">${name[0]}</div><span class="fan">${name}</span>${bt}<span style="margin-left:auto;">${del}</span></div>
      ${item.text?`<div class="ftext">${item.text}</div>`:''}${sh}${tgs?`<div class="ftags">${tgs}</div>`:''}</div>`;
  }).join('');
}

async function delItem(type,id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  showL('삭제 중...');
  try{
    await post({action:'deleteItem',type,id:String(id)});
    if(type==='quotes')cache.q=cache.q.filter(q=>String(q.id)!==String(id));
    else cache.t=cache.t.filter(t=>String(t.id)!==String(id));
    renderFeed(type==='quotes'?'q':'t');toast('삭제했어요.');
  }catch(e){toast('삭제 실패');}
  hideL();
}

// 문장 저장
async function submitQ(){
  const quote=document.getElementById('q-quote').value.trim();
  const memo=document.getElementById('q-memo').value.trim();
  const page=document.getElementById('q-page').value.trim();
  if(!quote&&!memo&&!page&&tags.q.length===0){toast('최소 한 가지는 입력해주세요.');return;}
  const btn=document.getElementById('q-sub');btn.disabled=true;showL('저장 중...');
  try{
    const data={id:String(Date.now()),book:selBook.q||'',member:cm,quote,page,memo,keywords:tags.q,ts:Date.now()};
    await post({action:'addQuote',data});
    cache.q.push(data);
    document.getElementById('q-quote').value='';document.getElementById('q-page').value='';document.getElementById('q-memo').value='';
    tags.q=[];renderTags('q');renderFeed('q');renderSugs();
    toast('문장을 기록했어요!');
  }catch(e){toast('저장 실패: '+e.message);}
  btn.disabled=false;hideL();
}

// 생각 저장
async function submitT(){
  const text=document.getElementById('t-text').value.trim();
  if(!text&&tags.t.length===0&&stars===0){toast('최소 한 가지는 입력해주세요.');return;}
  const btn=document.getElementById('t-sub');btn.disabled=true;showL('저장 중...');
  try{
    const data={id:String(Date.now()),book:selBook.t||'',member:cm,text,keywords:tags.t,stars,ts:Date.now()};
    await post({action:'addThought',data});
    cache.t.push(data);
    document.getElementById('t-text').value='';
    tags.t=[];stars=0;renderTags('t');renderSi();renderFeed('t');renderSugs();
    toast('생각을 기록했어요!');
  }catch(e){toast('저장 실패: '+e.message);}
  btn.disabled=false;hideL();
}

    nextInfo=n;

async function saveHist(){
  const date=document.getElementById('n-date').value;
  const book=document.getElementById('n-book').value.trim();
  if(!date&&!book){toast('날짜 또는 책 제목을 입력해주세요.');return;}
  showL('저장 중...');
  try{
    const data={date,book,type:mtype};
    if(mtype==='next'){
      await post({action:'saveNext',data:{date,book}});
      document.getElementById('n-dval').textContent=date?fmtD(date):'미정';
      document.getElementById('n-bval').textContent=book||'미정';
      nextInfo={date,book};
    }
    await post({action:'saveHistory',data});
    document.getElementById('n-date').value='';
    document.getElementById('n-book').value='';
    hpage=0;await loadHist();
    toast('저장했어요!');
  }catch(e){toast('저장 실패: '+e.message);}
  hideL();
}

async function loadHist(){
  try{
    const r=await api({action:'getHistory'});
    histAll=(r.history||[]).reverse();
    hpage=0;renderHistPage();
  }catch(e){console.error('loadHist',e);}
}

function hPage(dir){hpage+=dir;renderHistPage();}

function renderHistPage(){
  const el=document.getElementById('n-hist');
  const pgr=document.getElementById('n-pgr');
  if(!el)return;
  if(!histAll.length){
    el.innerHTML='<div class="empty" style="padding:20px;">아직 기록이 없어요.</div>';
    if(pgr)pgr.style.display='none';return;
  }
  const total=histAll.length;
  const totalP=Math.ceil(total/HPP);
  if(hpage<0)hpage=0;
  if(hpage>=totalP)hpage=totalP-1;
  const page=histAll.slice(hpage*HPP,(hpage+1)*HPP);

  el.innerHTML='<div class="tlw">'+page.map(item=>{
    const isN=item.type==='next';
    const isEditing=editingHistId===item.id;
    return `<div class="tli" id="hi-${item.id}">
      <div class="tld ${isN?'dn':'dd'}"></div>
      <div class="tlc ${isN?'isnext':''}">
        <div class="tlbadge ${isN?'bnext':'bdone'}">${isN?'다음 모임':'완료된 모임'}</div>
        <div class="tldate">${item.date?fmtD(item.date):'날짜 미정'}</div>
        <div class="tlbook ${isN?'isnext':''}">${item.book||'책 미정'}</div>
        ${isEditing?`
        <div class="tl-edit-row">
          <input type="date" id="he-date-${item.id}" value="${item.date||''}">
          <input type="text" id="he-book-${item.id}" placeholder="책 제목" value="${item.book||''}">
          <div style="display:flex;gap:6px;margin-bottom:4px;">
            <button class="bsm" id="he-done-${item.id}" onclick="setHType('${item.id}','done')" style="${item.type!=='next'?'background:var(--pl);color:var(--pd);border-color:var(--pm);':''}flex:1;">완료된 모임</button>
            <button class="bsm" id="he-next-${item.id}" onclick="setHType('${item.id}','next')" style="${item.type==='next'?'background:var(--tl);color:var(--td);border-color:#5DCAA5;':''}flex:1;">다음 모임 예고</button>
          </div>
          <div class="tl-edit-btns">
            <button class="bsv" style="flex:1;" onclick="saveHistEdit('${item.id}')">저장</button>
            <button class="bsm" style="flex:1;" onclick="cancelHistEdit()">취소</button>
          </div>
        </div>`:`
        <div class="tl-actions">
          <button class="tl-btn" onclick="startHistEdit('${item.id}')">수정</button>
          <button class="tl-btn del" onclick="delHist('${item.id}')">삭제</button>
        </div>`}
      </div>
    </div>`;
  }).join('')+'</div>';

  if(pgr){
    pgr.style.display=totalP>1?'flex':'none';
    document.getElementById('pgprev').disabled=hpage===0;
    document.getElementById('pgnext').disabled=hpage>=totalP-1;
    document.getElementById('pgi').textContent=`${hpage+1} / ${totalP}`;
  }
}

function startHistEdit(id){editingHistId=id;renderHistPage();}
function cancelHistEdit(){editingHistId=null;renderHistPage();}
function setHType(id,t){
  const d=document.getElementById(`he-done-${id}`);
  const n=document.getElementById(`he-next-${id}`);
  if(!d||!n)return;
  if(t==='done'){
    d.style.cssText='flex:1;background:var(--pl);color:var(--pd);border-color:var(--pm);';
    n.style.cssText='flex:1;background:transparent;color:var(--ts);border-color:var(--bm);';
  }else{
    n.style.cssText='flex:1;background:var(--tl);color:var(--td);border-color:#5DCAA5;';
    d.style.cssText='flex:1;background:transparent;color:var(--ts);border-color:var(--bm);';
  }
  const item=histAll.find(h=>h.id===id);
  if(item)item._editType=t;
}
async function saveHistEdit(id){
  const date=document.getElementById(`he-date-${id}`).value;
  const book=document.getElementById(`he-book-${id}`).value.trim();
  const item=histAll.find(h=>h.id===id);
  const type=item?.(item._editType||item.type)||'done';
  showL('수정 중...');
  try{
    await post({action:'updateHistory',id,data:{date,book,type}});
    if(item){item.date=date;item.book=book;item.type=type;delete item._editType;}
    editingHistId=null;renderHistPage();
    toast('수정했어요!');
  }catch(e){toast('수정 실패: '+e.message);}
  hideL();
}
async function delHist(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  showL('삭제 중...');
  try{
    await post({action:'deleteHistory',id});
    histAll=histAll.filter(h=>h.id!==id);
    renderHistPage();toast('삭제했어요.');
  }catch(e){toast('삭제 실패');}
  hideL();
}

// 우리의 책장
async function renderShelf(){
  const body=document.getElementById('sh-body');
  const strip=document.getElementById('sh-strip');
  const label=document.getElementById('sh-label');
  if(!books.length){
    strip.innerHTML='';label.textContent='';
    body.innerHTML='<div class="empty">아직 등록된 책이 없어요.<br>문장이나 생각을 남기면 책장이 채워져요!</div>';return;
  }
  if(shIdx>=books.length)shIdx=books.length-1;
  if(shIdx<0)shIdx=0;
  const book=books[shIdx];
  label.textContent=book;
  strip.innerHTML=books.map((b,i)=>`
    <div class="shcard ${i===shIdx?'on':''}" onclick="goSh(${i})">
      <div class="shspine" style="background:${COLORS[i%COLORS.length]};"></div>
      <div class="shtitle">${b}</div>
    </div>`).join('');
  showL('책 기록 불러오는 중...');
  try{
    const r=await api({action:'getAll',book:encodeURIComponent(book)});
    hideL();
    const qs=(r.quotes||[]).map(q=>{if(!Array.isArray(q.keywords))q.keywords=q.keywords?String(q.keywords).split(',').filter(Boolean):[];return q;});
    const ts=(r.thoughts||[]).map(t=>{if(!Array.isArray(t.keywords))t.keywords=t.keywords?String(t.keywords).split(',').filter(Boolean):[];t.stars=Number(t.stars)||0;return t;});
    renderShBody(book,COLORS[shIdx%COLORS.length],qs,ts);
  }catch(e){hideL();body.innerHTML='<div class="empty">기록을 불러오지 못했어요.</div>';}
}

function renderShBody(book,color,quotes,thoughts){
  const all=[...quotes,...thoughts];
  const kwCnt={};
  all.forEach(item=>(item.keywords||[]).forEach(kw=>{kwCnt[kw]=(kwCnt[kw]||0)+1;}));
  const kwS=Object.entries(kwCnt).sort((a,b)=>b[1]-a[1]);
  const maxK=kwS[0]?.[1]||1;
  const rbm={};thoughts.forEach(t=>{if(Number(t.stars)>0)rbm[t.member]=Number(t.stars);});
  const ratings=Object.values(rbm);
  const avg=ratings.length?(ratings.reduce((s,r)=>s+r,0)/ratings.length).toFixed(1):null;
  const nextD=nextInfo.date&&nextInfo.book&&nextInfo.book===book;

  document.getElementById('sh-body').innerHTML=`
    <div class="bbanner">
      <div class="rspine" style="background:${color};"></div>
      <div style="flex:1;">
        <div class="rbtitle">${book}</div>
        <div class="rbsub">기록 ${all.length}개</div>
        ${avg?`<div class="avgb">★ 평균 ${avg}</div>`:''}
      </div>
    </div>
    <div class="srow">
      <div class="sc"><div class="scl">총 기록</div><div class="scv">${all.length}</div></div>
      <div class="sc"><div class="scl">인상 문장</div><div class="scv">${quotes.length}</div></div>
      <div class="sc"><div class="scl">키워드</div><div class="scv">${kwS.length}</div></div>
    </div>
    ${kwS.length?`<div class="kwc">
      <div class="ct" style="margin-bottom:10px;">키워드</div>
      <div class="kww">${kwS.map(([w,c])=>{const cls=c>=maxK?'kw3':c>=maxK-1&&maxK>1?'kw2':'kw1';return `<span class="kw ${cls}">${w}</span>`;}).join('')}</div>
      <div class="kwh">크기 = 여럿이 함께 입력한 횟수</div>
    </div>`:''}
    ${Object.keys(rbm).length?`<div class="rc">
      <div class="ct" style="margin-bottom:10px;">각자의 별점</div>
      ${MEMBERS.map((n,i)=>{const s=rbm[i];if(!s)return'';return `<div class="rrow"><div class="av ${AVC[i]}" style="width:24px;height:24px;font-size:11px;">${n[0]}</div><span class="rname">${n}</span><div class="stars">${Array.from({length:5},(_,si)=>`<div class="star ${si<s?'son':'soff'}"></div>`).join('')}</div></div>`;}).join('')}
    </div>`:''}
    ${nextD?`<div class="np">
      <div class="npt">다음 모임 예고</div>
      <div class="npr">
        ${nextInfo.date?`<div><div class="npl">날짜</div><div class="npv">${fmtD(nextInfo.date)}</div></div>`:''}
        ${nextInfo.book?`<div><div class="npl">책</div><div class="npv">${nextInfo.book}</div></div>`:''}
      </div>
    </div>`:''}
  `;
}

function goSh(i){shIdx=i;renderShelf();}
function prevSh(){if(shIdx>0){shIdx--;renderShelf();}}
function nextSh(){if(shIdx<books.length-1){shIdx++;renderShelf();}}
</script>
